<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="notification-page">

<h1>
Notifications ❤️
</h1>

<div class="notification-card">

<img src="https://i.pravatar.cc/150?img=5">

<div>

<h4>
Emma Rose liked your photo
</h4>

<p>
2 minutes ago
</p>

</div>

</div>

<div class="notification-card">

<img src="https://i.pravatar.cc/150?img=8">

<div>

<h4>
Alex started following you
</h4>

<p>
10 minutes ago
</p>

</div>

<button>
Follow Back
</button>

</div>

<div class="notification-card">

<img src="https://i.pravatar.cc/150?img=18">

<div>

<h4>
Michael commented ❤️
</h4>

<p>
1 hour ago
</p>

</div>

</div>

<div class="notification-card">

<img src="https://i.pravatar.cc/150?img=25">

<div>

<h4>
Sophia mentioned you
</h4>

<p>
3 hours ago
</p>

</div>

</div>

<div class="notification-card">

<img src="https://i.pravatar.cc/150?img=28">

<div>

<h4>
Daniel shared your reel 🔥
</h4>

<p>
Yesterday
</p>

</div>

</div>

</div>

</body>
</html>
