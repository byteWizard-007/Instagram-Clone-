<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Messages</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dm-container">

<!-- LEFT -->

<div class="chat-sidebar">

<div class="dm-header">

<h2>your_username</h2>

<i class="fa-solid fa-pen-to-square"></i>

</div>

<div class="search-chat">

<input
type="text"
placeholder="Search Messages">

</div>

<div class="chat-list">

<div class="chat-user active-chat">

<img src="https://i.pravatar.cc/150?img=12">

<div>

<h4>Alex Carter</h4>

<p>Typing...</p>

</div>

<span class="online-dot"></span>

</div>

<div class="chat-user">

<img src="https://i.pravatar.cc/150?img=15">

<div>

<h4>Emma Rose</h4>

<p>Sent 2m ago</p>

</div>

</div>

<div class="chat-user">

<img src="https://i.pravatar.cc/150?img=22">

<div>

<h4>Michael</h4>

<p>Seen</p>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="chat-screen">

<div class="chat-top">

<img src="https://i.pravatar.cc/150?img=12">

<h3>Alex Carter</h3>

</div>

<div class="messages">

<div class="received">
Hey 👋
</div>

<div class="sent">
Hi Alex 🔥
</div>

<div class="received">
Instagram Clone semma da 😍
</div>

<div class="sent">
Thanks machi ❤️
</div>

</div>

<div class="message-box">

<input
type="text"
placeholder="Message...">

<button>
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

</div>

</body>
</html>
