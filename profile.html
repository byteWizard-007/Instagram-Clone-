<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | Instagram</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="profile-container">

<!-- PROFILE TOP -->

<div class="profile-header">

<div class="profile-image">

<img src="https://i.pravatar.cc/300?img=12">

</div>

<div class="profile-info">

<div class="profile-row">

<h2>your_username</h2>

<button class="edit-btn">
Edit Profile
</button>

<button class="share-btn">
Share Profile
</button>

</div>

<div class="profile-stats">

<div>
<b>148</b>
<span>Posts</span>
</div>

<div>
<b>24.8K</b>
<span>Followers</span>
</div>

<div>
<b>643</b>
<span>Following</span>
</div>

</div>

<div class="profile-bio">

<h4>Siva Ganesh</h4>

<p>
Frontend Developer 💻
</p>

<p>
HTML • CSS • JavaScript
</p>

<p>
🚀 Building Cool Projects
</p>

</div>

</div>

</div>

<!-- HIGHLIGHTS -->

<div class="highlights">

<div class="highlight">

<img src="https://picsum.photos/100?1">

<p>Travel</p>

</div>

<div class="highlight">

<img src="https://picsum.photos/100?2">

<p>Coding</p>

</div>

<div class="highlight">

<img src="https://picsum.photos/100?3">

<p>Food</p>

</div>

<div class="highlight">

<img src="https://picsum.photos/100?4">

<p>Friends</p>

</div>

<div class="highlight">

<img src="https://picsum.photos/100?5">

<p>Projects</p>

</div>

</div>

<!-- TABS -->

<div class="profile-tabs">

<div class="tab active-tab">
<i class="fa-solid fa-table-cells"></i>
Posts
</div>

<div class="tab">
<i class="fa-solid fa-clapperboard"></i>
Reels
</div>

<div class="tab">
<i class="fa-regular fa-bookmark"></i>

</div>

<div class="tab">
<i class="fa-regular fa-user"></i>

</div>

</div>
